    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232736;
            --border: #2d3148;
            --text: #e4e6f0;
            --text-dim: #8b8fa8;
            --accent: #6c5ce7;
            --accent2: #00cec9;
            --green: #00b894;
            --orange: #fdcb6e;
            --red: #e17055;
            --blue: #74b9ff;
            --pink: #fd79a8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            direction: rtl;
        }

        .header {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-stats {
            display: flex;
            gap: 24px;
        }

        .stat {
            text-align: center;
        }

        .stat-num {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent2);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .filters {
            padding: 16px 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .filter-btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .search-bar {
            margin-right: auto;
            position: relative;
        }

        .search-bar input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 16px 6px 36px;
            color: var(--text);
            font-size: 0.85rem;
            width: 220px;
            direction: rtl;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .container {
            padding: 24px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 16px;
        }

        .container.list-view {
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .container.list-view .card {
            padding: 10px 16px;
            display: grid;
            grid-template-columns: minmax(180px, 1.2fr) minmax(0, 2fr) auto auto auto;
            align-items: center;
            gap: 14px;
        }

        .container.list-view .card:hover { transform: none; }

        .container.list-view .card-top {
            margin-bottom: 0;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            display: flex;
        }

        .container.list-view .card-path,
        .container.list-view .card-desc {
            margin-bottom: 0;
            font-size: 0.78rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .container.list-view .card-links {
            margin-bottom: 0;
        }

        .container.list-view .card-footer {
            border-top: none;
            padding-top: 0;
        }

        .container.list-view .notes-input { min-width: 120px; }

        .delete-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover { background: var(--red); color: white; }

        .view-toggle {
            display: flex;
            gap: 4px;
            margin-right: 12px;
        }

        .view-toggle button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-toggle button.active,
        .view-toggle button:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.15);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }

        .card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-git { background: rgba(253, 121, 168, 0.15); color: var(--pink); }
        .badge-claude { background: rgba(108, 92, 231, 0.15); color: var(--accent); }
        .badge-node { background: rgba(0, 206, 201, 0.15); color: var(--accent2); }
        .badge-python { background: rgba(253, 203, 110, 0.15); color: var(--orange); }
        .badge-html { background: rgba(116, 185, 255, 0.15); color: var(--blue); }
        .badge-csharp { background: rgba(0, 184, 148, 0.15); color: var(--green); }
        .badge-render { background: rgba(225, 112, 85, 0.15); color: var(--red); }

        .card-path {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-bottom: 10px;
            font-family: 'Consolas', monospace;
            direction: ltr;
            text-align: right;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .card-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.78rem;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
        }

        .link-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .link-btn.github { border-color: var(--pink); color: var(--pink); }
        .link-btn.github:hover { background: var(--pink); color: white; }
        .link-btn.live { border-color: var(--green); color: var(--green); }
        .link-btn.live:hover { background: var(--green); color: white; }
        .link-btn.folder { border-color: var(--blue); color: var(--blue); }
        .link-btn.folder:hover { background: var(--blue); color: white; }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .status-select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 4px 8px;
            font-size: 0.78rem;
            cursor: pointer;
        }

        .status-select:focus { outline: none; border-color: var(--accent); }

        .notes-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 4px 10px;
            font-size: 0.78rem;
            direction: rtl;
        }

        .notes-input:focus { outline: none; border-color: var(--accent); }

        .save-indicator {
            font-size: 0.7rem;
            color: var(--green);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .save-indicator.show { opacity: 1; }

        .status-active { color: var(--green); }
        .status-paused { color: var(--orange); }
        .status-archived { color: var(--text-dim); }
        .status-wip { color: var(--accent2); }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; padding: 16px; }
            .header, .filters { padding: 16px; }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--green);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: transform 0.3s;
            z-index: 200;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>

    let DELETED = new Set();
    let VIEW_MODE = 'cards';

    function loadSaved() {
        const saved = localStorage.getItem('gil-projects-data');
        if (saved) {
            const data = JSON.parse(saved);
            PROJECTS.forEach(p => {
                if (data[p.id]) {
                    p.status = data[p.id].status || '';
                    p.notes = data[p.id].notes || '';
                }
            });
        }
        const del = localStorage.getItem('gil-projects-deleted');
        if (del) DELETED = new Set(JSON.parse(del));
        const vm = localStorage.getItem('gil-projects-view');
        if (vm === 'list' || vm === 'cards') VIEW_MODE = vm;
    }

    function saveData() {
        const data = {};
        PROJECTS.forEach(p => {
            data[p.id] = { status: p.status, notes: p.notes };
        });
        localStorage.setItem('gil-projects-data', JSON.stringify(data));
        showToast();
    }

    function saveDeleted() {
        localStorage.setItem('gil-projects-deleted', JSON.stringify([...DELETED]));
    }

    function deleteProject(id) {
        const p = PROJECTS.find(x => x.id === id);
        if (!p) return;
        if (!confirm(`האם אתה בטוח שברצונך למחוק את "${p.name}"?`)) return;
        DELETED.add(id);
        saveDeleted();
        const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
        renderProjects(activeFilter, document.getElementById('searchInput').value);
    }

    function setViewMode(mode) {
        VIEW_MODE = mode;
        localStorage.setItem('gil-projects-view', mode);

        document.getElementById('viewList').classList.toggle('active', mode === 'list');
        const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
        renderProjects(activeFilter, document.getElementById('searchInput').value);
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1500);
    }

    function renderProjects(filter = 'all', search = '') {
        const grid = document.getElementById('projectsGrid');
        grid.classList.toggle('list-view', VIEW_MODE === 'list');
        let filtered = PROJECTS.filter(p => !DELETED.has(p.id));

        if (filter !== 'all') {
            filtered = filtered.filter(p => p.tags.includes(filter));
        }

        if (search) {
            const s = search.toLowerCase();
            filtered = filtered.filter(p =>
                p.name.toLowerCase().includes(s) ||
                p.desc.includes(s) ||
                p.path.toLowerCase().includes(s)
            );
        }

        grid.innerHTML = filtered.map(p => `
            <div class="card" data-id="${p.id}">
                <div class="card-top">
                    <div class="card-title">${p.name}</div>
                    <div class="card-badges">
                        ${p.tags.map(t => `<span class="badge badge-${t}">${tagLabel(t)}</span>`).join('')}
                    </div>
                </div>
                <div class="card-path">${p.path}</div>
                <div class="card-desc">${p.desc}</div>
                <div class="card-links">
                    ${p.github ? `<a href="${p.github}" target="_blank" class="link-btn github">GitHub</a>` : ''}
                    ${p.live ? `<a href="${p.live}" target="_blank" class="link-btn live">Live Site</a>` : ''}
                    <span class="link-btn folder" onclick="copyPath('${p.path.replace(/\\/g, '\\\\')}')">העתק נתיב</span>
                </div>
                <div class="card-footer">
                    <select class="status-select" onchange="updateStatus('${p.id}', this.value)">
                        <option value="" ${p.status === '' ? 'selected' : ''}>סטטוס...</option>
                        <option value="active" ${p.status === 'active' ? 'selected' : ''}>פעיל</option>
                        <option value="wip" ${p.status === 'wip' ? 'selected' : ''}>בפיתוח</option>
                        <option value="paused" ${p.status === 'paused' ? 'selected' : ''}>מושהה</option>
                        <option value="archived" ${p.status === 'archived' ? 'selected' : ''}>ארכיון</option>
                    </select>
                    <input class="notes-input" type="text" placeholder="הערות..."
                        value="${escapeHtml(p.notes)}"
                        onchange="updateNotes('${p.id}', this.value)" />
                    <span class="save-indicator" id="save-${p.id}">&#10003;</span>
                    ${VIEW_MODE === 'list' ? `<button class="delete-btn" onclick="deleteProject('${p.id}')" title="מחק">מחק</button>` : ''}
                </div>
            </div>
        `).join('');

        const visible = PROJECTS.filter(p => !DELETED.has(p.id));
        document.getElementById('totalCount').textContent = visible.length;
        document.getElementById('gitCount').textContent = visible.filter(p => p.tags.includes('git')).length;
        document.getElementById('claudeCount').textContent = visible.filter(p => p.tags.includes('claude')).length;
    }

    function tagLabel(t) {
        const map = { git: 'GitHub', claude: 'Claude', node: 'Node.js', python: 'Python', html: 'HTML', csharp: 'C#', render: 'Render' };
        return map[t] || t;
    }

    function escapeHtml(s) {
        return s.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function updateStatus(id, val) {
        const p = PROJECTS.find(x => x.id === id);
        if (p) { p.status = val; saveData(); }
    }

    function updateNotes(id, val) {
        const p = PROJECTS.find(x => x.id === id);
        if (p) { p.notes = val; saveData(); }
    }

    function copyPath(path) {
        navigator.clipboard.writeText(path).then(() => showToast());
    }

    // Filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProjects(btn.dataset.filter, document.getElementById('searchInput').value);
        });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
        renderProjects(activeFilter, e.target.value);
    });

    document.getElementById('viewCards').addEventListener('click', () => setViewMode('cards'));
    document.getElementById('viewList').addEventListener('click', () => setViewMode('list'));

    loadSaved();
    setViewMode(VIEW_MODE);
    </script>
</body>
</html>
